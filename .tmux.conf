# Turn on mouse support
set -g mouse on
set-environment -g 'IGNOREEOF' 2
set-option -g default-shell /opt/homebrew/bin/fish
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",*:Tc"
set -g allow-passthrough on

# Reload tmux config with <prefix> r
unbind r
bind r source-file ~/.tmux.conf

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Swap windows with Shift + Left/Right (no prefix needed)
bind -n S-Left swap-window -t -1\; select-window -t -1
bind -n S-Right swap-window -t +1\; select-window -t +1

# Jump between prompts (requires shell integration for OSC 133 marks)
bind -n M-Up copy-mode \; send-keys -X previous-prompt
bind -n M-Down copy-mode \; send-keys -X next-prompt

# Resize bindings
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5

# <prefix> t will fullscreen the current pane
bind -r z resize-pane -Z
bind -r t resize-pane -Z

# Split bindings
bind -r | split-window -h
bind -r _ split-window -v

setw -g visual-activity off
setw -g monitor-activity on
set-option -g bell-action none

# Vi mode
set-option -g status-keys vi
set-window-option -g mode-keys vi
bind v copy-mode # enter copy mode with <prefix>v
bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# Clear terminal screen and scrollback history
unbind l
bind l send-keys 'C-l'
bind k clear-history

# Increase the size of the scrollback buffer
set-option -g history-limit 50000

unbind f
TMUX_FZF_LAUNCH_KEY="f"
bind s run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/session.sh switch"

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# Plugin manager (<prefix>U, and type "all" to update all plugins)
set -g @plugin 'tmux-plugins/tpm'

# Tmux plugins
set -g @plugin 'jimeh/tmux-themepack'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'sainnhe/tmux-fzf'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

set -g @themepack 'powerline/default/cyan'
set -gu @theme-status-left
set -gu @theme-status-left-prefix
set -g @theme-status-left-suffix "#{?client_prefix,#[fg=colour172]#[bold],}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
